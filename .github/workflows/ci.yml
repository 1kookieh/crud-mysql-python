name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & smoke test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install system deps for Tkinter
        run: sudo apt-get update && sudo apt-get install -y python3-tk

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile all Python files (smoke test)
        run: |
          python -m py_compile main.py
          python -m py_compile app/__init__.py app/config.py app/crud.py app/database.py app/errors.py app/models.py app/ui.py
          python -m py_compile scripts/init_db.py

      - name: Import sanity check (sem MySQL)
        run: |
          python -c "import app.errors, app.models; print('imports ok')"
